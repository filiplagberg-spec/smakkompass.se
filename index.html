<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Smakkompass — Din personliga sommelier</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
:root {
  --cream: #f5f0e8;
  --cream-dark: #ece5d8;
  --warm-brown: #3d2b1f;
  --terracotta: #b85c3a;
  --terracotta-light: #f0e0d8;
  --green: #2d4a3e;
  --gold: #c49a3c;
  --gold-light: #f5edda;
  --blue-light: #e8eff8;
  --blue: #3a6ea8;
  --text: #2a1f18;
  --text-muted: #7a6a5e;
  --border: rgba(61,43,31,0.12);
  --white: #fffdf9;
  --shadow-sm: 0 1px 3px rgba(61,43,31,0.08);
  --shadow-md: 0 4px 16px rgba(61,43,31,0.10);
  --nav-h: 60px;
  --mob-nav-h: 64px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: -webkit-fill-available; height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  height: 100%;
  height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* NAV */
nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--nav-h);
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  position: relative;
  z-index: 100;
}
.nav-logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--warm-brown); letter-spacing: -0.02em; flex-shrink: 0; }
.nav-logo span { color: var(--terracotta); }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab { padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-muted); border-radius: 8px; transition: all 0.15s; touch-action: manipulation; font-family: 'DM Sans', sans-serif; }
.nav-tab.active { background: var(--terracotta-light); color: var(--terracotta); }
.nav-tab:hover:not(.active) { background: var(--cream-dark); color: var(--text); }
.saved-badge { background: var(--terracotta); color: white; font-size: 11px; border-radius: 10px; padding: 1px 6px; margin-left: 4px; display: none; }
.lang-btn {
  padding: 6px 12px; font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--border); border-radius: 20px;
  background: var(--cream); color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif; white-space: nowrap; flex-shrink: 0;
}
.lang-btn:hover { border-color: var(--terracotta); color: var(--terracotta); background: var(--terracotta-light); }

/* PANELS */
.panel { display: none; flex: 1; overflow: hidden; }
.panel.active { display: flex; flex-direction: column; }

/* ERIK PANEL */
#panel-erik {
  height: calc(100dvh - var(--nav-h));
  max-height: calc(100dvh - var(--nav-h));
}
@supports not (height: 100dvh) {
  #panel-erik {
    height: calc(100vh - var(--nav-h));
    max-height: calc(100vh - var(--nav-h));
  }
}
.erik-layout {
  display: flex; flex-direction: column;
  height: 100%; max-width: 740px; margin: 0 auto; width: 100%;
  padding: 0 1.5rem;
}
.erik-intro { padding: 2rem 0 1rem; text-align: center; flex-shrink: 0; }
.erik-intro.hidden { display: none; }
.erik-avatar-wrap { position: relative; display: inline-block; margin-bottom: 1rem; }
.erik-avatar { width: 68px; height: 68px; background: var(--warm-brown); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto; box-shadow: 0 4px 20px rgba(61,43,31,0.2); }
.erik-online { position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; background: #4caf7d; border-radius: 50%; border: 2px solid var(--cream); }
.erik-intro h1 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; color: var(--warm-brown); margin-bottom: 8px; }
.erik-intro h1 em { font-style: italic; color: var(--terracotta); }
.erik-intro p { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 420px; margin: 0 auto; }

.suggestions-wrap { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0.75rem 0 0.5rem; flex-shrink: 0; }
.suggestions-wrap.hidden { display: none; }
.sug { padding: 8px 14px; font-size: 13px; color: var(--terracotta); background: var(--white); border: 1px solid rgba(184,92,58,0.25); border-radius: 20px; cursor: pointer; transition: all 0.15s; touch-action: manipulation; font-family: 'DM Sans', sans-serif; }
.sug:hover, .sug:active { background: var(--terracotta); color: white; }

.erik-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding: 0.5rem 0 1rem; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
.erik-messages::-webkit-scrollbar { width: 4px; }
.erik-messages::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 4px; }

.msg { display: flex; gap: 10px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-bottom: 2px; }
.msg.ai .msg-avatar { background: var(--warm-brown); color: var(--cream); font-size: 16px; }
.msg.user .msg-avatar { background: var(--terracotta-light); color: var(--terracotta); font-weight: 600; }
.msg-bubble { max-width: 78%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.7; word-break: break-word; }
.msg.user .msg-bubble { background: var(--terracotta); color: white; border-bottom-right-radius: 4px; }
.msg.ai .msg-bubble { background: var(--white); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; box-shadow: var(--shadow-sm); }
.msg.ai .msg-bubble strong { color: var(--warm-brown); font-weight: 600; }
.msg.ai .msg-bubble em { font-style: italic; color: var(--text-muted); }
.msg.ai .msg-bubble p + p { margin-top: 8px; }

.typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.typing-dots span { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; opacity: 0.5; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity:0.5; } 30% { transform: translateY(-7px); opacity:1; } }

.erik-input-wrap { padding: 0.75rem 0 1rem; flex-shrink: 0; border-top: 1px solid var(--border); }
.erik-input-row { display: flex; gap: 8px; align-items: flex-end; }
.btn-camera { width: 50px; height: 50px; border-radius: 14px; background: var(--cream-dark); border: 1.5px solid var(--border); font-size: 18px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
.btn-camera:hover, .btn-camera.has-image { background: var(--terracotta-light); border-color: var(--terracotta); }
.erik-input { flex: 1; padding: 13px 16px; font-size: 16px; font-family: 'DM Sans', sans-serif; border: 1.5px solid var(--cream-dark); border-radius: 16px; background: var(--white); color: var(--text); resize: none; height: 50px; max-height: 130px; line-height: 1.5; transition: border-color 0.2s; overflow-y: hidden; -webkit-appearance: none; }
.erik-input:focus { outline: none; border-color: var(--terracotta); }
.erik-input::placeholder { color: var(--text-muted); opacity: 0.65; }
.btn-send { width: 50px; height: 50px; border-radius: 14px; background: var(--terracotta); border: none; color: white; font-size: 22px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; display: flex; align-items: center; justify-content: center; touch-action: manipulation; -webkit-appearance: none; }
.btn-send:hover { background: #a04d2e; }
.btn-send:active { transform: scale(0.95); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.img-preview-wrap { display: none; padding: 8px 0 0; align-items: center; gap: 10px; }
.img-preview-wrap.visible { display: flex; }
.img-preview { height: 64px; border-radius: 10px; border: 1.5px solid var(--border); object-fit: cover; }
.img-clear { width: 22px; height: 22px; border-radius: 50%; background: var(--terracotta); color: white; border: none; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.img-hint { font-size: 12px; color: var(--text-muted); }

/* MATCH CARDS */
.match-card { background: var(--white); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; margin-top: 12px; box-shadow: var(--shadow-md); max-width: 100%; }
.mc-header { background: var(--warm-brown); color: var(--cream); padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
.mc-header-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 400; line-height: 1.3; }
.mc-section { padding: 14px 18px; }
.mc-section-border { border-top: 1px solid var(--border); }
.mc-section-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; }
.mc-item { display: flex; gap: 12px; align-items: flex-start; }
.mc-item-border { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
.mc-item-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; opacity: 0.7; }
.mc-item-body { flex: 1; min-width: 0; }
.mc-item-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
.mc-item-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
.mc-item-why { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
.mc-pris { display: inline-block; font-size: 11.5px; font-weight: 500; color: var(--gold); background: var(--gold-light); padding: 2px 9px; border-radius: 10px; margin-top: 6px; }
.mc-tips { border-top: 1px solid var(--border); padding: 12px 18px; background: var(--cream); font-size: 13px; color: var(--text-muted); line-height: 1.65; display: flex; gap: 8px; align-items: flex-start; }
.mc-tips-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--terracotta); background: var(--terracotta-light); padding: 3px 8px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
.mc-actions { border-top: 1px solid var(--border); padding: 12px 18px; display: flex; gap: 8px; flex-wrap: wrap; background: var(--cream); }
.mc-btn { padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: 10px; cursor: pointer; transition: all 0.15s; touch-action: manipulation; font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; border: none; }
.mc-btn-sb { background: var(--warm-brown); color: var(--cream); }
.mc-btn-sb:hover { background: #5a3d2a; }
.mc-btn-save { background: var(--white); border: 1.5px solid rgba(45,74,62,0.3) !important; color: var(--green); }
.mc-btn-save:hover { background: var(--green); color: white; }
.mc-btn-save.saved { background: var(--green); color: white; pointer-events: none; }

/* SAVED PANEL */
#panel-saved { overflow-y: auto; -webkit-overflow-scrolling: touch; }
.saved-inner { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 3rem; width: 100%; }
.panel-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; color: var(--warm-brown); margin-bottom: 6px; }
.panel-title em { font-style: italic; color: var(--terracotta); }
.panel-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
.saved-empty { text-align: center; padding: 5rem 0; color: var(--text-muted); font-size: 14px; }
.saved-grid { display: grid; gap: 12px; }
.saved-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.5rem; box-shadow: var(--shadow-sm); }
.saved-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.saved-dish { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--warm-brown); }
.saved-date { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.saved-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
.pill.vin { background: var(--terracotta-light); color: var(--terracotta); }
.pill.ol { background: var(--gold-light); color: #7a5000; }
.pill.af { background: var(--blue-light); color: var(--blue); }
.btn-del { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text-muted); padding: 4px 8px; border-radius: 7px; transition: all 0.15s; }
.btn-del:hover { background: #fff0ee; color: #c0392b; }

/* GUIDE PANEL */
#panel-guide { overflow-y: auto; -webkit-overflow-scrolling: touch; }
.guide-inner { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 4rem; width: 100%; }
.guide-hero { background: var(--warm-brown); color: var(--cream); border-radius: 20px; padding: 2rem; margin-bottom: 1.5rem; position: relative; overflow: hidden; }
.guide-hero::before { content: ''; position: absolute; right: -20px; top: -20px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.04); pointer-events: none; }
.guide-hero h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 400; margin-bottom: 8px; }
.guide-hero p { font-size: 13.5px; opacity: 0.72; line-height: 1.7; }
.sec-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: var(--warm-brown); margin: 1.5rem 0 0.75rem; }
.quick-table { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: 1rem; }
.qt-item + .qt-item { border-top: 1px solid var(--border); }
.qt-row { display: flex; align-items: center; gap: 10px; padding: 14px 18px; cursor: pointer; transition: background 0.12s; min-height: 52px; touch-action: manipulation; user-select: none; }
.qt-row:hover, .qt-row:active { background: var(--cream); }
.qt-label { font-weight: 500; color: var(--text); flex: 1; font-size: 14px; }
.qt-more { font-size: 12px; color: var(--terracotta); font-weight: 600; background: var(--terracotta-light); padding: 3px 10px; border-radius: 8px; transition: transform 0.2s; flex-shrink: 0; }
.qt-item.open .qt-more { transform: rotate(90deg); }
.qt-detail { display: none; padding: 12px 18px 16px; font-size: 13.5px; color: var(--text-muted); line-height: 1.8; border-top: 1px solid var(--border); background: var(--cream); }
.qt-item.open .qt-detail { display: block; }
.exp-section { border: 1px solid var(--border); border-radius: 14px; background: var(--white); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow-sm); }
.exp-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; cursor: pointer; transition: background 0.15s; gap: 12px; touch-action: manipulation; min-height: 60px; user-select: none; }
.exp-header:hover, .exp-header:active { background: var(--cream); }
.exp-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400; color: var(--warm-brown); margin-bottom: 2px; }
.exp-summary { font-size: 12px; color: var(--text-muted); }
.exp-arrow { font-size: 18px; color: var(--text-muted); transition: transform 0.25s; flex-shrink: 0; }
.exp-section.open .exp-arrow { transform: rotate(180deg); }
.exp-body { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
.exp-section.open .exp-body { display: block; }
.exp-body p { font-size: 13.5px; color: var(--text-muted); line-height: 1.85; margin-top: 14px; }
.exp-body p + p { margin-top: 10px; }
.exp-body strong { color: var(--text); font-weight: 500; }
.temp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
.temp-row { display: flex; flex-direction: column; gap: 3px; background: var(--cream); border-radius: 10px; padding: 10px 12px; }
.temp-badge { font-size: 12px; font-weight: 600; color: var(--terracotta); }
.temp-label { font-size: 12px; color: var(--text-muted); }

/* MOBILE */
@media (max-width: 600px) {
  nav { padding: 0 1rem; }
  nav .nav-tabs { display: none; }
  .nav-logo { font-size: 18px; }
  .lang-btn { font-size: 11px; padding: 5px 9px; }
  #panel-erik {
    height: calc(100dvh - var(--nav-h) - var(--mob-nav-h));
    max-height: calc(100dvh - var(--nav-h) - var(--mob-nav-h));
  }
  .erik-layout { padding: 0 1rem; }
  .erik-intro { padding: 1.25rem 0 0.5rem; }
  .erik-avatar { width: 56px; height: 56px; font-size: 24px; }
  .erik-intro h1 { font-size: 21px; }
  .erik-intro p { font-size: 13px; }
  .suggestions-wrap { flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; padding-bottom: 6px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .suggestions-wrap::-webkit-scrollbar { display: none; }
  .sug { flex-shrink: 0; font-size: 12.5px; padding: 7px 12px; }
  .msg-bubble { max-width: 88%; font-size: 13.5px; }
  .erik-input-wrap { padding: 0.5rem 0 0.625rem; }
  .erik-input { height: 48px; }
  .btn-send, .btn-camera { width: 48px; height: 48px; }
  .saved-inner { padding: 1.25rem 1rem 5rem; }
  .guide-inner { padding: 1.25rem 1rem 5rem; }
  .temp-grid { grid-template-columns: 1fr; }
}

/* MOBILE BOTTOM NAV */
.mobile-bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-top: 1.5px solid var(--border);
  z-index: 9999;
  height: var(--mob-nav-h);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  box-shadow: 0 -2px 16px rgba(61,43,31,0.1);
}
@media (max-width: 600px) { .mobile-bottom-nav { display: flex; } }
.mbn-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 0; border: none; background: none; cursor: pointer;
  color: var(--text-muted); font-size: 11px; font-weight: 500; gap: 4px;
  touch-action: manipulation; font-family: 'DM Sans', sans-serif;
  position: relative; z-index: 9999;
  -webkit-tap-highlight-color: rgba(184,92,58,0.1);
  transition: color 0.15s;
}
.mbn-icon { font-size: 20px; line-height: 1; }
.mbn-btn.active { color: var(--terracotta); }
.mbn-btn:active { background: var(--cream); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Smak<span>kompass</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="nav-sommelier" onclick="showPanel('erik',this)">Sommelier</button>
    <button class="nav-tab" id="nav-saved" onclick="showPanel('saved',this)">Sparade <span class="saved-badge" id="saved-badge"></span></button>
    <button class="nav-tab" id="nav-guide" onclick="showPanel('guide',this)">Guide</button>
  </div>
  <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
</nav>

<div class="mobile-bottom-nav">
  <button class="mbn-btn active" id="mbn-erik" onclick="showPanelMobile('erik')">
    <span class="mbn-icon">◈</span><span id="mbn-lbl-erik">Sommelier</span>
  </button>
  <button class="mbn-btn" id="mbn-saved" onclick="showPanelMobile('saved')">
    <span class="mbn-icon">◉</span><span id="mbn-lbl-saved">Sparade</span>
  </button>
  <button class="mbn-btn" id="mbn-guide" onclick="showPanelMobile('guide')">
    <span class="mbn-icon">◎</span><span id="mbn-lbl-guide">Guide</span>
  </button>
</div>

<!-- ERIK -->
<div id="panel-erik" class="panel active">
  <div class="erik-layout">
    <div class="erik-intro" id="erik-intro">
      <div class="erik-avatar-wrap">
        <div class="erik-avatar">◈</div>
        <div class="erik-online"></div>
      </div>
      <h1 id="intro-title">Din personliga <em>sommelier</em></h1>
      <p id="intro-sub">Berätta vad du lagar — jag matchar rätt dryck. Eller ställ en fråga om vin, öl eller mat.</p>
    </div>
    <div class="suggestions-wrap" id="suggestions"></div>
    <div class="erik-messages" id="erik-messages"></div>
    <div class="erik-input-wrap">
      <div class="erik-input-row">
        <button class="btn-camera" id="btn-camera" onclick="document.getElementById('img-input').click()" title="Ta bild på en vinflaska">⊕</button>
        <input type="file" id="img-input" accept="image/*" capture="environment" style="display:none" onchange="handleImage(this)">
        <textarea class="erik-input" id="erik-input" rows="1"></textarea>
        <button class="btn-send" id="btn-send" onclick="sendMsg()">↑</button>
      </div>
      <div class="img-preview-wrap" id="img-preview-wrap">
        <img class="img-preview" id="img-preview" />
        <button class="img-clear" onclick="clearImage()">✕</button>
        <span class="img-hint" id="img-hint">Bild vald — skriv en fråga eller skicka direkt</span>
      </div>
    </div>
  </div>
</div>

<!-- SAVED -->

function applyLang(l) {
  const t = I18N[l];
  document.documentElement.lang = l;
  document.getElementById('lang-btn').textContent = t.langBtn;
  document.getElementById('nav-sommelier').childNodes[0].textContent = t.navSommelier + ' ';
  document.getElementById('nav-saved').childNodes[0].textContent = t.navSaved + ' ';
  document.getElementById('nav-guide').textContent = t.navGuide;
  document.getElementById('mbn-lbl-erik').textContent = t.navSommelier;
  document.getElementById('mbn-lbl-saved').textContent = t.navSaved;
  document.getElementById('mbn-lbl-guide').textContent = t.navGuide;
  document.getElementById('intro-title').innerHTML = t.introTitle;
  document.getElementById('intro-sub').textContent = t.introSub;
  document.getElementById('erik-input').placeholder = t.placeholder;
  document.getElementById('btn-camera').title = t.cameraTitle;
  document.getElementById('img-hint').textContent = t.imgHint;
  document.getElementById('saved-title').innerHTML = t.savedTitle;
  document.getElementById('saved-sub').textContent = t.savedSub;
  // Re-render suggestions
  const sugsEl = document.getElementById('suggestions');
  if (sugsEl && !sugsEl.classList.contains('hidden')) {
    sugsEl.innerHTML = t.sugs.map(s => `<button class="sug" onclick="useSug(this)">${s}</button>`).join('');
  }
  // Re-render guide
  renderGuide(t);
  // Re-render saved
  renderSaved();
}

function toggleLang() {
  lang = lang === 'sv' ? 'en' : 'sv';
  applyLang(lang);
}

// ── CHAT STATE ────────────────────────────────────────────────────
let history = [];
let busy = false;
let lastMatch = null;
let currentImageBase64 = null;
let currentImageType = null;

// ── IMAGE ─────────────────────────────────────────────────────────
function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  currentImageType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (e) => {
    currentImageBase64 = e.target.result.split(',')[1];
    document.getElementById('img-preview').src = e.target.result;
    document.getElementById('img-preview-wrap').classList.add('visible');
    document.getElementById('btn-camera').classList.add('has-image');
  };
  reader.readAsDataURL(file);
  input.value = '';
}
function clearImage() {
  currentImageBase64 = null; currentImageType = null;
  document.getElementById('img-preview-wrap').classList.remove('visible');
  document.getElementById('btn-camera').classList.remove('has-image');
}

// ── SEND ──────────────────────────────────────────────────────────
async function sendMsg() {
  const inp = document.getElementById('erik-input');
  const text = (inp.value || '').trim();
  const hasImage = !!currentImageBase64;
  if ((!text && !hasImage) || busy) return;
  const t = I18N[lang];
  const userText = text || t.imgDefault;
  inp.value = ''; inp.style.height = '50px';
  hideIntro();
  busy = true;
  document.getElementById('btn-send').disabled = true;

  let userContent;
  if (hasImage) {
    userContent = [
      { type: 'image', source: { type: 'base64', media_type: currentImageType, data: currentImageBase64 } },
      { type: 'text', text: userText }
    ];
    clearImage();
  } else {
    userContent = userText;
  }

  appendUser(userText);
  history.push({ role: 'user', content: userContent });
  const typingEl = appendTyping();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, system: SYSTEM })
    });
    if (!resp.ok) throw new Error('Server error');
    const data = await resp.json();
    const full = data.content?.[0]?.text || '';
    typingEl.remove();
    const aiBubble = appendAiStreaming();
    const bubbleContent = aiBubble.querySelector('.msg-bubble');
    const cleaned = full.trim().replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```\s*$/i,'').trim();
    if (cleaned.startsWith('{')) {
      try {
        const parsed = JSON.parse(cleaned);
        bubbleContent.innerHTML = '';
        if (parsed.intro) { const p = document.createElement('p'); p.innerHTML = formatText(parsed.intro); bubbleContent.appendChild(p); }
        if (parsed.typ === 'match') { lastMatch = parsed; bubbleContent.appendChild(buildMatchCard(parsed)); }
        else if (parsed.typ === 'matmatch') { bubbleContent.appendChild(buildMatmatchCard(parsed)); }
        else if (parsed.typ === 'bildanalys') { bubbleContent.appendChild(buildBildanalysCard(parsed)); }
        else { bubbleContent.innerHTML = formatText(full); }
      } catch { bubbleContent.innerHTML = formatText(full); }
    } else { bubbleContent.innerHTML = formatText(full); }
    history.push({ role: 'assistant', content: full });
  } catch(e) {
    typingEl.remove();
    appendAi('Något gick fel. Försök igen.');
  }
  busy = false;
  document.getElementById('btn-send').disabled = false;
  scrollMessages();
}

function useSug(btn) { document.getElementById('erik-input').value = btn.textContent; sendMsg(); }

    ${af.namn?`<div class="mc-section mc-section-border"><div class="mc-section-label">${t.nonAlcLabel}</div>
      <div class="mc-item"><div class="mc-item-body"><div class="mc-item-name">${af.namn}</div><div class="mc-item-why">${af.varfor||''}</div>${af.pris?`<span class="mc-pris">${af.pris}</span>`:''}</div></div></div>`:''}

      <a class="mc-btn mc-btn-sb" href="https://www.systembolaget.se/sok/?searchQuery=${sbQ}" target="_blank" rel="noopener">${t.sbBtn}</a>

    <div class="mc-section">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        ${d.producent?`<div><div class="mc-section-label">Producent</div><div style="font-size:14px;font-weight:500;color:var(--text)">${d.producent}</div></div>`:''}
        ${d.druva?`<div><div class="mc-section-label">Druvsort</div><div style="font-size:14px;font-weight:500;color:var(--text)">${d.druva}</div></div>`:''}
        ${d.region?`<div><div class="mc-section-label">Region</div><div style="font-size:14px;font-weight:500;color:var(--text)">${d.region}</div></div>`:''}
        ${d.argang?`<div><div class="mc-section-label">Årgång</div><div style="font-size:14px;font-weight:500;color:var(--text)">${d.argang}</div></div>`:''}
      </div>
      ${d.smakprofil?`<div class="mc-section-label">Smakprofil</div><div style="font-size:13.5px;color:var(--text-muted);line-height:1.7;margin-top:4px">${d.smakprofil}</div>`:''}
    </div>
    ${d.pris||d.betyg?`<div class="mc-section mc-section-border" style="display:flex;gap:20px;align-items:flex-start">
      ${d.pris?`<div><div class="mc-section-label">Pris</div><span class="mc-pris" style="margin-top:4px;display:inline-block">${d.pris}</span></div>`:''}
      ${d.betyg?`<div style="flex:1"><div class="mc-section-label">Betyg</div><div style="font-size:13px;color:var(--text-muted);margin-top:4px;line-height:1.5">${d.betyg}</div></div>`:''}
    </div>`:''}
    ${d.mat?.length?`<div class="mc-section mc-section-border"><div class="mc-section-label">${t.pairedWith}</div>${matHtml}</div>`:''}
    ${d.tips?`<div class="mc-tips"><span class="mc-tips-label">${t.tipsLabel}</span>${d.tips}</div>`:''}`;
  return card;
}

// ── MESSAGE HELPERS ───────────────────────────────────────────────
function appendUser(text) {
  const msgs = document.getElementById('erik-messages');
  const d = document.createElement('div'); d.className='msg user';
  d.innerHTML=`<div class="msg-avatar">U</div><div class="msg-bubble">${esc(text).replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(d); scrollMessages();
}
function appendAi(text) {
  const msgs = document.getElementById('erik-messages');
  const d = document.createElement('div'); d.className='msg ai';
  d.innerHTML=`<div class="msg-avatar">◈</div><div class="msg-bubble">${formatText(text)}</div>`;
  msgs.appendChild(d); scrollMessages(); return d;
}
function appendAiStreaming() {
  const msgs = document.getElementById('erik-messages');
  const d = document.createElement('div'); d.className='msg ai';
  d.innerHTML=`<div class="msg-avatar">◈</div><div class="msg-bubble"></div>`;
  msgs.appendChild(d); scrollMessages(); return d;
}
function appendTyping() {
  const msgs = document.getElementById('erik-messages');
  const d = document.createElement('div'); d.className='msg ai';
  d.innerHTML=`<div class="msg-avatar">◈</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(d); scrollMessages(); return d;
}
function scrollMessages() { const m=document.getElementById('erik-messages'); if(m) m.scrollTop=m.scrollHeight; }
function hideIntro() { document.getElementById('erik-intro')?.classList.add('hidden'); document.getElementById('suggestions')?.classList.add('hidden'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatText(t) {
  t=esc(t);
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.*?)\*/g,'<em>$1</em>');
  t=t.replace(/\n\n/g,'</p><p>');
  t=t.replace(/\n/g,'<br>');
  return '<p>'+t+'</p>';
}

// ── SAVED ─────────────────────────────────────────────────────────
function sparaMatch(btnId) {
  if (!lastMatch) return;
  const t = I18N[lang];
  const saved = getSaved();
  saved.unshift({ id: Date.now(), date: new Date().toLocaleDateString('sv-SE'), ratt: lastMatch.ratt||'—', vin: (lastMatch.viner||[]).map(v=>v.namn).join(', ')||'—', ol: lastMatch.ol?.namn||null, af: lastMatch.alkoholfritt?.namn||null });
  localStorage.setItem('smakkompass_saved', JSON.stringify(saved));
  const btn = document.getElementById(btnId);
  if (btn) { btn.textContent=t.savedBtn; btn.classList.add('saved'); }
  updateBadge();
}
function getSaved() { try { return JSON.parse(localStorage.getItem('smakkompass_saved')||'[]'); } catch { return []; } }
function updateBadge() {
  const n=getSaved().length;
  const b=document.getElementById('saved-badge');
  if(b){b.textContent=n; b.style.display=n>0?'inline':'none';}
}
function renderSaved() {
  const t = I18N[lang];
  const area=document.getElementById('saved-area');
  const saved=getSaved();
  if(!saved.length){area.innerHTML=`<div class="saved-empty">${t.savedEmpty.replace('\n\n','<br><br>')}</div>`;return;}
  area.innerHTML='<div class="saved-grid">'+saved.map(s=>`
    <div class="saved-card">
      <div class="saved-top">
        <div><div class="saved-dish">${s.ratt}</div><div class="saved-date">${s.date}</div></div>
        <button class="btn-del" onclick="radera(${s.id})">✕</button>
      </div>
      <div class="saved-pills">
        ${s.vin&&s.vin!=='—'?`<span class="pill vin">${s.vin}</span>`:''}
        ${s.ol?`<span class="pill ol">${s.ol}</span>`:''}
        ${s.af?`<span class="pill af">${s.af}</span>`:''}
      </div>
    </div>`).join('')+'</div>';
}
function radera(id) { localStorage.setItem('smakkompass_saved',JSON.stringify(getSaved().filter(s=>s.id!==id))); updateBadge(); renderSaved(); }

// ── INIT ──────────────────────────────────────────────────────────
(function init() {
  applyLang('sv');
  updateBadge();
  const inp = document.getElementById('erik-input');
  if (inp) {
    inp.addEventListener('input', () => { inp.style.height='50px'; inp.style.height=Math.min(inp.scrollHeight,130)+'px'; });
    inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
  }
})();
</script>
